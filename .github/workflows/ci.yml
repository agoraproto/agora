name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend (FastAPI) tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
          pip install -e ../../packages/sdk-python

      - name: Lint
        run: ruff check .

      - name: Tests
        env:
          PYTHONPATH: src
        run: pytest -v

  sdk-import:
    name: Python SDK importable
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e packages/sdk-python
      - run: python -c "from agora_sdk import Agent, AgentIdentity; print('OK', Agent, AgentIdentity)"

  contracts-build:
    name: Foundry contracts compile
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
      - name: Install deps
        run: |
          forge install OpenZeppelin/openzeppelin-contracts --no-commit || true
          forge install foundry-rs/forge-std --no-commit || true
      - name: Build
        run: forge build
      - name: Tests
        run: forge test -vv
