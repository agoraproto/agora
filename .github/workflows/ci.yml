name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend (FastAPI) tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
          pip install -e ../../packages/sdk-python

      - name: Lint
        run: ruff check .

      - name: Tests
        env:
          PYTHONPATH: src
        run: pytest -v

  sdk-import:
    name: Python SDK importable
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e packages/sdk-python
      - run: python -c "from agora_sdk import Agent, AgentIdentity; print('OK', Agent, AgentIdentity)"


  sdk-typescript:
    name: TypeScript SDK build + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/sdk-typescript
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install (workspace)
        working-directory: .
        run: pnpm install --frozen-lockfile=false
      - name: Typecheck
        run: pnpm typecheck
      - name: Build
        run: pnpm build
      - name: Tests
        run: pnpm test

  contracts-build:
    name: Foundry contracts compile
    runs-on: ubuntu-latest
    # Contracts sind in Bootstrap-Phase off-scope (ADR 003).
    # Job darf aktuell scheitern, ohne CI komplett rot zu faerben.
    continue-on-error: true
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
      - name: Install dependencies via git clone (no submodules in Bootstrap)
        run: |
          mkdir -p lib
          git clone --depth 1 https://github.com/foundry-rs/forge-std lib/forge-std
          git clone --depth 1 https://github.com/OpenZeppelin/openzeppelin-contracts lib/openzeppelin-contracts
      - name: Build
        run: forge build
      - name: Tests
        run: forge test -vv
